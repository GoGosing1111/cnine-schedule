<!doctype html><html lang='ko'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>CNINE SCHEDULE</title><style>body{margin:0;padding:12px;background:#030507}
#cnineSchedule{position:relative;width:100%;max-width:760px;margin:0 auto;background:radial-gradient(circle at top,rgba(45,145,255,.22),transparent 34%),linear-gradient(180deg,#05070d 0%,#071426 52%,#030507 100%);padding:8px;box-sizing:border-box;font-family:Arial,'Malgun Gothic',sans-serif;color:#fff;overflow:hidden;border-radius:18px;border:1px solid rgba(90,175,255,.45)}
#cnineSchedule *{box-sizing:border-box}#cnineSchedule button,#cnineSchedule input,#cnineSchedule textarea{font:inherit}.c9Hero{position:relative;padding:18px 10px 16px;text-align:center;border:1px solid rgba(90,175,255,.55);border-radius:18px;background:linear-gradient(135deg,rgba(25,125,255,.28),rgba(0,0,0,.70));box-shadow:0 0 18px rgba(40,145,255,.25);overflow:hidden}.c9Hero:before{content:"";position:absolute;right:-70px;top:-120px;width:260px;height:260px;border-radius:50%;background:rgba(105,206,241,.12)}.c9TopBtns{position:absolute;right:10px;top:9px;display:flex;align-items:center;gap:6px;z-index:2}.c9Pill,.c9Btn{display:inline-flex;align-items:center;justify-content:center;min-height:28px;padding:6px 10px;border-radius:999px;background:rgba(0,18,38,.48);border:1px solid rgba(105,185,255,.35);color:#9ccfff;font-size:11px;font-weight:900;line-height:1;white-space:nowrap;text-decoration:none;cursor:pointer}.c9Btn{background:linear-gradient(135deg,#2f9bff,#635bff);color:#fff;box-shadow:0 0 12px rgba(47,155,255,.30)}.c9Logo{display:block;width:112px;max-width:45%;height:auto;margin:16px auto 8px;filter:drop-shadow(0 0 8px rgba(255,255,255,.30))}.c9Title{font-size:27px;line-height:1.05;font-weight:1000;color:#fff;text-shadow:0 0 9px rgba(75,170,255,.95),0 3px 0 #002b55,0 8px 18px #000}.c9Sub{display:inline-block;margin-top:9px;padding:6px 12px;border-radius:999px;color:#fff;font-size:12px;font-weight:900;border:1px solid rgba(105,185,255,.55);background:rgba(0,18,38,.50)}.c9Nav{margin-top:11px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}.c9Nav button{border:1px solid rgba(105,185,255,.40);border-radius:999px;background:#081c33;color:#fff;font-size:12px;font-weight:1000;padding:8px 13px;cursor:pointer}.c9Nav .today{background:#fff;color:#0b3b70}.c9Section{margin:10px 0 13px;padding:0;border:1px solid #2f9bff;border-radius:18px;background:#071426;overflow:hidden;box-shadow:0 0 14px rgba(47,155,255,.45)}.c9SectionHead{padding:14px 12px;background:linear-gradient(180deg,#12345c,#071526);color:#fff;font-size:19px;font-weight:1000;text-align:center;text-shadow:0 0 8px rgba(80,170,255,.85),0 2px 0 #000;border-bottom:2px solid #2f9bff}.c9SectionBody{padding:10px;background:#081525;border-top:1px solid rgba(255,255,255,.10);text-align:center}.c9Grid{display:grid;grid-template-columns:1fr;gap:10px}.c9Person{border:1px solid rgba(90,175,255,.24);border-radius:14px;background:linear-gradient(180deg,rgba(45,145,255,.10),rgba(0,0,0,.26));padding:10px}.c9PersonTop{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:8px}.c9Name{color:#fff;font-size:16px;font-weight:1000;text-shadow:0 2px 0 #000}.c9Tag{padding:3px 8px;border-radius:999px;background:rgba(0,0,0,.24);border:1px solid #7ec8ff;color:#7ec8ff;font-size:10px;font-weight:1000}.c9Week{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:5px}.c9Day{height:76px;border:1px solid rgba(90,175,255,.28);border-radius:12px;background:#06111f;padding:6px 3px;cursor:pointer;overflow:hidden}.c9Day:hover,.c9TextBox:hover,.c9CalDay:hover{outline:2px solid #69cef1}.c9Dow{font-size:11px;color:#9ccfff;font-weight:1000}.sun{color:#ff6b8a!important}.sat{color:#7ec8ff!important}.c9DayText{margin-top:5px;color:#fff;font-size:11px;font-weight:900;line-height:1.18;white-space:pre-wrap;word-break:break-all;overflow:hidden;max-height:48px}.c9TodayGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.c9TextBox{min-height:108px;border:1px solid rgba(90,175,255,.28);border-radius:14px;background:#06111f;padding:12px;color:#fff;font-size:13px;font-weight:900;line-height:1.35;white-space:pre-wrap;word-break:keep-all;cursor:pointer;overflow:hidden;text-align:left}.c9Label{margin:0 0 7px;color:#9ccfff;font-size:12px;font-weight:1000;text-align:left}.c9WeekLabels,.c9Calendar{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:5px}.c9WeekLabels div{color:#9ccfff;font-size:12px;font-weight:1000;text-align:center;margin-bottom:5px}.c9CalDay{height:76px;border:1px solid rgba(90,175,255,.28);border-radius:12px;background:#06111f;padding:6px 4px;cursor:pointer;overflow:hidden;text-align:left}.c9CalDay.empty{visibility:hidden}.c9CalDay.selected{background:#17230f;border-color:#ffd34f}.c9Num{font-size:13px;font-weight:1000;color:#fff;margin-bottom:3px}.c9CalText{font-size:9.5px;line-height:1.15;font-weight:900;color:#fff;white-space:pre-wrap;word-break:break-all;max-height:48px;overflow:hidden}.c9ModalBack{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;z-index:99999;padding:16px}.c9Modal{width:min(520px,100%);background:#071426;border:1px solid #2f9bff;border-radius:20px;padding:18px;box-shadow:0 30px 80px rgba(0,0,0,.55);color:#fff}.c9Modal h3{margin:0 0 8px;font-size:22px}.c9ModalSub{font-size:13px;color:#9ccfff;font-weight:900;margin-bottom:10px}.c9Modal textarea{width:100%;min-height:150px;resize:vertical}.c9Modal input{width:100%;height:48px}.c9Modal textarea,.c9Modal input{border:1px solid rgba(90,175,255,.45);border-radius:14px;padding:12px;background:#030910;color:#fff;font-weight:900;line-height:1.45}.c9Actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}.c9Action{border:0;border-radius:13px;padding:12px;font-weight:1000;cursor:pointer}.c9Primary{background:#2f9bff;color:#fff}.c9Danger{background:#ff6b8a;color:#fff}.c9Ghost{background:#10243d;color:#dff2ff}.c9Toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#fff;color:#102b52;padding:12px 17px;border-radius:999px;font-weight:1000;opacity:0;pointer-events:none;transition:.2s;z-index:100000}.c9Toast.show{opacity:1}.c9Water{margin-top:12px;text-align:center;color:#7ec8ff;font-size:11px;font-weight:800;text-shadow:0 0 6px rgba(80,170,255,.35)}
@media(max-width:640px){#cnineSchedule{border-radius:14px;padding:6px}.c9TopBtns{position:relative;right:auto;top:auto;justify-content:center;margin-bottom:6px}.c9Logo{width:88px;margin-top:6px}.c9Title{font-size:22px}.c9SectionHead{font-size:17px}.c9TodayGrid{grid-template-columns:1fr}.c9Day{height:68px}.c9CalDay{height:68px}.c9Actions{grid-template-columns:1fr}.c9Pill,.c9Btn{font-size:10px;padding:5px 8px}}</style></head><body><div id="cnineSchedule">
  <div class="c9Hero">
    <div class="c9TopBtns"><button class="c9Btn" id="c9ChangePw">비밀번호 변경</button><button class="c9Btn" id="c9Save">저장</button></div>
    <img class="c9Logo" id="c9Logo" src="https://keyman1335-maker.github.io/poong-rank/assets/crew_logos/cninelogo.png?v=9999" onerror="this.style.display='none';document.getElementById('c9LogoFallback').style.display='block';">
    <div id="c9LogoFallback" style="display:none;margin:16px auto 8px;width:92px;height:92px;border-radius:22px;background:linear-gradient(135deg,#69cef1,#2f80ed,#102b52);color:#fff;font-size:28px;font-weight:1000;line-height:92px;text-align:center;box-shadow:0 0 16px rgba(47,155,255,.35);">C9</div>
    <div class="c9Title">CNINE SCHEDULE</div>
    <div class="c9Sub" id="c9Month">씨나인 일정표</div>
    <div class="c9Nav"><button id="c9Prev">‹ 이전</button><button class="today" id="c9TodayBtn">오늘</button><button id="c9Next">다음 ›</button></div>
  </div>
  <div class="c9Section"><div class="c9SectionHead">📅 주간 스케줄</div><div class="c9SectionBody"><div class="c9Grid" id="c9Weekly"></div></div></div>
  <div class="c9Section"><div class="c9SectionHead">🔥 오늘의 일정 <span id="c9TodayDate" style="display:block;margin-top:5px;color:#9ccfff;font-size:12px;font-weight:900;text-shadow:none;"></span></div><div class="c9SectionBody"><div class="c9TodayGrid"><div><div class="c9Label">오늘의 일정</div><div class="c9TextBox" id="c9TodaySchedule">등록된 일정 없음</div></div><div><div class="c9Label">공지 / 메모</div><div class="c9TextBox" id="c9TodayMemo">등록된 메모 없음</div></div></div></div></div>
  <div class="c9Section"><div class="c9SectionHead" id="c9CalTitle">🗓 월간 일정표</div><div class="c9SectionBody"><div class="c9WeekLabels"><div class="sun">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="sat">토</div></div><div class="c9Calendar" id="c9Calendar"></div></div></div>
  <div class="c9Water">CNINE Schedule Developed by 유두위생크림</div>
</div>
<div class="c9ModalBack" id="c9ModalBack"><div class="c9Modal"><h3 id="c9ModalTitle">수정</h3><div class="c9ModalSub" id="c9ModalSub"></div><textarea id="c9ModalText" placeholder="표시할 텍스트를 입력하세요"></textarea><div class="c9Actions"><button class="c9Action c9Ghost" id="c9Cancel">취소</button><button class="c9Action c9Danger" id="c9Clear">비우기</button><button class="c9Action c9Primary" id="c9Apply">적용</button></div></div></div>
<div class="c9ModalBack" id="c9PwBack"><div class="c9Modal"><h3>관리자 저장</h3><div class="c9ModalSub">비밀번호를 입력하면 현재 일정이 저장됩니다.</div><input id="c9AdminPw" type="password" placeholder="관리자 비밀번호"><div class="c9Actions" style="grid-template-columns:1fr 1fr"><button class="c9Action c9Ghost" id="c9PwCancel">취소</button><button class="c9Action c9Primary" id="c9PwSave">저장</button></div></div></div>
<div class="c9ModalBack" id="c9ChangeBack"><div class="c9Modal"><h3>비밀번호 변경</h3><div class="c9ModalSub">현재 비밀번호 확인 후 새 비밀번호로 변경합니다.</div><input id="c9CurPw" type="password" placeholder="현재 비밀번호" style="margin-bottom:8px"><input id="c9NewPw" type="password" placeholder="새 비밀번호" style="margin-bottom:8px"><input id="c9NewPw2" type="password" placeholder="새 비밀번호 확인"><div class="c9Actions" style="grid-template-columns:1fr 1fr"><button class="c9Action c9Ghost" id="c9ChangeCancel">취소</button><button class="c9Action c9Primary" id="c9ChangeApply">변경</button></div></div></div>
<div class="c9Toast" id="c9Toast">완료</div><script>(function(){
const API_BASE=location.origin;
const dows=['일','월','화','수','목','금','토'];const todayReal=new Date();let view=new Date(todayReal.getFullYear(),todayReal.getMonth(),1);let selected=dateKey(todayReal.getFullYear(),todayReal.getMonth()+1,todayReal.getDate());let editCtx=null;let adminPasswordHash='';
const DEFAULT={settings:{logoUrl:'https://keyman1335-maker.github.io/poong-rank/assets/crew_logos/cninelogo.png?v=9999'},members:[{id:'chulgu',name:'철구',tag:'수장'},{id:'angji',name:'앵지',tag:'학생회장'},{id:'bbanghun',name:'빵훈이',tag:'선도부장'},{id:'star',name:'스타부',tag:'부서'},{id:'excel',name:'엑셀부',tag:'부서'}],weekly:{chulgu:['','','','','','',''],angji:['','','','','','',''],bbanghun:['','','','','','',''],star:['','','','','','',''],excel:['','','','','','','']},today:{schedule:'',memo:''},monthly:{}};let data=JSON.parse(JSON.stringify(DEFAULT));
function $(id){return document.getElementById(id)}function pad(n){return String(n).padStart(2,'0')}function dateKey(y,m,d){return y+'-'+pad(m)+'-'+pad(d)}function dot(k){return k.replaceAll('-','.')}function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
async function sha256Client(text){const enc=new TextEncoder().encode(String(text||''));const buf=await crypto.subtle.digest('SHA-256',enc);return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}
function clean(raw){const src=raw&&raw.data?raw.data:raw||{};const out=JSON.parse(JSON.stringify(DEFAULT));out.settings=Object.assign(out.settings,src.settings||{});out.members=Array.isArray(src.members)?src.members:out.members;out.weekly=Object.assign(out.weekly,src.weekly||{});out.today=Object.assign(out.today,src.today||{});out.monthly=(src.monthly&&typeof src.monthly==='object')?src.monthly:{};out.members.forEach(m=>{if(!out.weekly[m.id])out.weekly[m.id]=['','','','','','',''];});return out}
async function load(){const urls=[API_BASE+'/.netlify/functions/save-schedule?ts='+Date.now(),API_BASE+'/data/schedule.json?ts='+Date.now()];for(const url of urls){try{const res=await fetch(url,{cache:'no-store'});if(!res.ok)continue;const raw=await res.json();adminPasswordHash=raw.adminPasswordHash||'';data=clean(raw);renderAll();return}catch(e){}}try{const saved=localStorage.getItem('cnineScheduleLocal');if(saved)data=clean(JSON.parse(saved))}catch(e){}renderAll()}
function show(t){const el=$('c9Toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1700)}function header(){const label=view.getFullYear()+'년 '+(view.getMonth()+1)+'월';$('c9Month').textContent=label;$('c9CalTitle').textContent='🗓 월간 일정표 ('+label+')';const logo=data.settings&&data.settings.logoUrl;if(logo)$('c9Logo').src=logo}
function renderWeekly(){const box=$('c9Weekly');box.innerHTML='';data.members.forEach(m=>{const arr=data.weekly[m.id]||['','','','','','',''];const div=document.createElement('div');div.className='c9Person';div.innerHTML='<div class="c9PersonTop"><span class="c9Name">'+esc(m.name)+'</span><span class="c9Tag">'+esc(m.tag||'-')+'</span></div><div class="c9Week">'+dows.map((d,i)=>'<div class="c9Day" data-id="'+esc(m.id)+'" data-day="'+i+'"><div class="c9Dow '+(i==0?'sun':i==6?'sat':'')+'">'+d+'</div><div class="c9DayText">'+esc(arr[i]||'')+'</div></div>').join('')+'</div>';box.appendChild(div)});box.querySelectorAll('.c9Day').forEach(el=>el.onclick=()=>openModal({type:'weekly',id:el.dataset.id,day:Number(el.dataset.day)}))}
function renderToday(){$('c9TodayDate').textContent=dot(selected);$('c9TodaySchedule').textContent=data.today.schedule||'등록된 일정 없음';$('c9TodayMemo').textContent=data.today.memo||'등록된 메모 없음'}
function holiday(m,d,y){const md=pad(m)+'-'+pad(d);return ['01-01','03-01','05-05','06-06','07-17','08-15','10-03','10-09','12-25'].includes(md)}
function renderCalendar(){header();const cal=$('c9Calendar');cal.innerHTML='';const y=view.getFullYear(),m=view.getMonth()+1;const first=new Date(y,m-1,1).getDay();const last=new Date(y,m,0).getDate();for(let i=0;i<first;i++){const e=document.createElement('div');e.className='c9CalDay empty';cal.appendChild(e)}for(let d=1;d<=last;d++){const k=dateKey(y,m,d);const dow=new Date(y,m-1,d).getDay();const cls=holiday(m,d,y)?'sun':dow===0?'sun':dow===6?'sat':'';const el=document.createElement('div');el.className='c9CalDay'+(k===selected?' selected':'');el.innerHTML='<div class="c9Num '+cls+'">'+d+'</div><div class="c9CalText">'+esc(data.monthly[k]||'')+'</div>';el.onclick=()=>{selected=k;renderToday();renderCalendar();openModal({type:'monthly',date:k})};cal.appendChild(el)}}function renderAll(){renderWeekly();renderToday();renderCalendar()}
function nameOf(id){const m=data.members.find(x=>x.id===id);return m?m.name:id}function openModal(ctx){editCtx=ctx;let title='수정',sub='',val='';if(ctx.type==='weekly'){title='주간 스케줄 수정';sub=nameOf(ctx.id)+' · '+dows[ctx.day]+'요일';val=(data.weekly[ctx.id]||[])[ctx.day]||''}if(ctx.type==='todaySchedule'){title='오늘의 일정 수정';sub='오늘의 일정';val=data.today.schedule||''}if(ctx.type==='todayMemo'){title='공지 / 메모 수정';sub='공지 / 메모';val=data.today.memo||''}if(ctx.type==='monthly'){title='월간 일정 수정';sub=dot(ctx.date);val=data.monthly[ctx.date]||''}$('c9ModalTitle').textContent=title;$('c9ModalSub').textContent=sub;$('c9ModalText').value=val;$('c9ModalBack').style.display='flex';setTimeout(()=>$('c9ModalText').focus(),50)}function closeModal(){$('c9ModalBack').style.display='none';editCtx=null}
function apply(clear){if(!editCtx)return;const v=clear?'':$('c9ModalText').value.trim();if(editCtx.type==='weekly'){if(!data.weekly[editCtx.id])data.weekly[editCtx.id]=['','','','','','',''];data.weekly[editCtx.id][editCtx.day]=v}if(editCtx.type==='todaySchedule')data.today.schedule=v;if(editCtx.type==='todayMemo')data.today.memo=v;if(editCtx.type==='monthly'){if(v)data.monthly[editCtx.date]=v;else delete data.monthly[editCtx.date]}renderAll();closeModal();show(clear?'비움 완료':'수정 완료')}
async function saveToServer(password,newPassword){const payload={password,data};if(newPassword)payload.newPassword=newPassword;const res=await fetch(API_BASE+'/.netlify/functions/save-schedule',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const json=await res.json().catch(()=>({}));if(!res.ok)throw new Error(json.error||'저장 실패');localStorage.setItem('cnineScheduleLocal',JSON.stringify(data));return json}
$('c9TodaySchedule').onclick=()=>openModal({type:'todaySchedule'});$('c9TodayMemo').onclick=()=>openModal({type:'todayMemo'});$('c9Cancel').onclick=closeModal;$('c9Apply').onclick=()=>apply(false);$('c9Clear').onclick=()=>apply(true);$('c9ModalBack').onclick=e=>{if(e.target===$('c9ModalBack'))closeModal()};$('c9Prev').onclick=()=>{view=new Date(view.getFullYear(),view.getMonth()-1,1);renderCalendar()};$('c9Next').onclick=()=>{view=new Date(view.getFullYear(),view.getMonth()+1,1);renderCalendar()};$('c9TodayBtn').onclick=()=>{view=new Date(todayReal.getFullYear(),todayReal.getMonth(),1);selected=dateKey(todayReal.getFullYear(),todayReal.getMonth()+1,todayReal.getDate());renderAll()};$('c9Save').onclick=()=>{$('c9PwBack').style.display='flex';$('c9AdminPw').value='';setTimeout(()=>$('c9AdminPw').focus(),50)};$('c9PwCancel').onclick=()=>$('c9PwBack').style.display='none';$('c9PwBack').onclick=e=>{if(e.target===$('c9PwBack'))$('c9PwBack').style.display='none'};async function doSave(){try{$('c9PwSave').disabled=true;$('c9PwSave').textContent='확인 중';if(adminPasswordHash){const h=await sha256Client($('c9AdminPw').value);if(h!==adminPasswordHash){show('비밀번호가 틀렸습니다');return}}$('c9PwSave').textContent='저장 중';const r=await saveToServer($('c9AdminPw').value);if(r.adminPasswordHash)adminPasswordHash=r.adminPasswordHash;$('c9PwBack').style.display='none';show('저장 완료')}catch(e){show(e.message)}finally{$('c9PwSave').disabled=false;$('c9PwSave').textContent='저장'}}$('c9PwSave').onclick=doSave;$('c9AdminPw').addEventListener('keydown',e=>{if(e.key==='Enter')doSave()});$('c9ChangePw').onclick=()=>{$('c9ChangeBack').style.display='flex';$('c9CurPw').value='';$('c9NewPw').value='';$('c9NewPw2').value='';};$('c9ChangeCancel').onclick=()=>$('c9ChangeBack').style.display='none';async function doChange(){const cur=$('c9CurPw').value,next=$('c9NewPw').value.trim(),confirm=$('c9NewPw2').value.trim();if(!next){show('새 비밀번호를 입력하세요');return}if(next.length<4){show('비밀번호는 4자 이상');return}if(next!==confirm){show('새 비밀번호가 일치하지 않습니다');return}try{$('c9ChangeApply').disabled=true;if(adminPasswordHash){const h=await sha256Client(cur);if(h!==adminPasswordHash){show('현재 비밀번호가 틀렸습니다');return}}const r=await saveToServer(cur,next);if(r.adminPasswordHash)adminPasswordHash=r.adminPasswordHash;$('c9ChangeBack').style.display='none';show('비밀번호 변경 완료')}catch(e){show(e.message)}finally{$('c9ChangeApply').disabled=false}}$('c9ChangeApply').onclick=doChange;load();
})();</script></body></html>
